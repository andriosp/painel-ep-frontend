<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Usuários • Painel Educação Profissional</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e5e7eb;
      --shadow: 0 10px 24px rgba(15,23,42,.08);
      --radius:14px;
      --radius-sm:12px;
      --brand:#2563eb;
      --brand-dark:#1d4ed8;
      --ok:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container{
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 18px 36px;
    }

    .topnav{
      display:flex;
      gap:10px;
      padding:10px 0 14px;
      align-items:center;
      flex-wrap:wrap;
    }

    .navlink{
      text-decoration:none;
      color: var(--muted);
      font-weight:750;
      font-size:13px;
      padding:8px 12px;
      border-radius:12px;
      border:1px solid transparent;
    }

    .navlink:hover{
      background:#fff;
      border-color: var(--border);
    }

    .navlink.active{
      background: rgba(37,99,235,.10);
      color: var(--text);
      border-color: rgba(37,99,235,.25);
    }

    .topnav-right{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      color: var(--muted);
      font-size:12px;
      box-shadow: 0 6px 14px rgba(15,23,42,.06);
      white-space:nowrap;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background: var(--brand);
      box-shadow: 0 0 0 5px rgba(37,99,235,.12);
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .title h1{
      margin:0;
      font-size:28px;
      letter-spacing:.2px;
    }

    .title p{
      margin:6px 0 0;
      color: var(--muted);
      font-size:13px;
    }

    .panel,
    .table-card{
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel{
      padding:14px;
      margin-bottom:14px;
    }

    .table-card{
      overflow:hidden;
    }

    .form-grid{
      display:grid;
      grid-template-columns: repeat(5, minmax(180px, 1fr));
      gap:12px;
      align-items:end;
    }

    .field label{
      display:block;
      font-size:12px;
      color: var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .field input,
    .field select{
      width:100%;
      height:44px;
      border:1px solid var(--border);
      border-radius: var(--radius-sm);
      padding:10px 12px;
      background:#fff;
      outline:none;
      font-size:14px;
    }

    .field input:focus,
    .field select:focus{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color: var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:650;
      font-size:13px;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
    }

    button:hover{
      background:#f8fafc;
      border-color:#dbe3ef;
    }

    button:active{
      transform: translateY(1px);
    }

    .btn-primary{
      background: var(--brand);
      color:#fff;
      border-color: rgba(37,99,235,.65);
    }

    .btn-primary:hover{
      background: var(--brand-dark);
    }

    .status{
      font-size:12px;
      color: var(--muted);
      min-height:18px;
      margin-top:10px;
    }

    .table-wrap{
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
    }

    table{
      width:100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    thead th{
      background:#fbfcfe;
      border-bottom:1px solid var(--border);
      color: var(--muted);
      font-size:11px;
      text-transform: uppercase;
      letter-spacing: .15px;
      padding: 10px 12px;
      text-align:left;
      white-space:nowrap;
    }

    tbody td{
      border-bottom:1px solid #eef2f7;
      padding: 12px;
      font-size: 13px;
      vertical-align:top;
    }

    tbody tr:nth-child(odd){
      background:#fcfdff;
    }

    tbody tr:hover{
      background: rgba(37,99,235,.05);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 10px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }

    .pill.ok{
      background:#ecfdf3;
      color:#15803d;
      border:1px solid #b7ebc6;
    }

    .pill.off{
      background:#fff5f5;
      color:#b91c1c;
      border:1px solid #fecaca;
    }

    .pill.warn{
      background:#fffbeb;
      color:#b45309;
      border:1px solid #fde68a;
    }

    .muted{
      color: var(--muted);
      font-size:12px;
      margin-top:4px;
    }

    .empty{
      padding:24px;
      text-align:center;
      color: var(--muted);
      font-size:14px;
    }

    @media (max-width: 1200px){
      .form-grid{
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 700px){
      .form-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <script>
  (async function validarSessao(){
    try{
      const resp = await fetch(`${API}/auth/me`, {
        credentials: "include"
      });

      if(!resp.ok){
        window.location.href = "/login.html";
        return;
      }

      const data = await resp.json();

      if(data.deve_trocar_senha){
        window.location.href = "/alterar_senha.html";
        return;
      }

      if(data.perfil !== "admin"){
        alert("Acesso restrito a administradores.");
        window.location.href = "/index.html";
      }
    }catch(e){
      window.location.href = "/login.html";
    }
  })();
  </script>

  <div class="container">
    <nav class="topnav">
      <a href="index.html" class="navlink">Dashboard</a>
      <a href="usuarios_admin.html" class="navlink active">Usuários</a>
      <a href="reset_solicitacoes.html" class="navlink">Solicitações de reset</a>

      <div class="topnav-right">
        <a href="alterar_senha.html" class="navlink">Alterar senha</a>

        <div id="usuario-logado" class="badge">
          <span class="dot"></span>
          Usuário: —
        </div>

        <button onclick="logout()">Sair</button>
      </div>
    </nav>

    <div class="header">
      <div class="title">
        <h1>Administração de usuários</h1>
        <p>Cadastre e acompanhe os usuários e seus perfis de acesso.</p>
      </div>
    </div>

    <div class="panel">
      <div class="form-grid">
        <div class="field">
          <label for="nome">Nome</label>
          <input id="nome" type="text" placeholder="Nome completo" />
        </div>

        <div class="field">
          <label for="usuario">Usuário</label>
          <input id="usuario" type="text" placeholder="Login do usuário" />
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="email@dominio.com" />
        </div>

        <div class="field">
          <label for="perfil">Perfil</label>
          <select id="perfil"></select>
        </div>

        <div class="field">
          <label for="ativo">Status</label>
          <select id="ativo">
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </div>
      </div>

      <div class="actions" style="margin-top:12px;">
        <button type="button" class="btn-primary" onclick="criarUsuario()">Cadastrar usuário</button>
        <button type="button" onclick="limparFormulario()">Limpar</button>
      </div>

      <div class="status" id="statusForm"></div>
    </div>

    <div class="table-card">
      <div class="table-wrap" id="tableWrap"></div>
    </div>
  </div>

  <script>
    const API = "https://painel-ep-backend.onrender.com";

    async function carregarUsuario(){
      try{
        const resp = await fetch(`${API}/auth/me`, {
          credentials: "include"
        });

        if(!resp.ok) return;

        const data = await resp.json();
        const el = document.getElementById("usuario-logado");

        if(el){
          el.innerHTML = `<span class="dot"></span> Usuário: ${data.usuario}`;
        }
      }catch(e){
        console.error(e);
      }
    }

    async function logout(){
      try{
        await fetch(`${API}/auth/logout`, {
          method: "POST",
          credentials: "include"
        });
      }catch(e){}

      window.location.href = "/login.html";
    }

    function setStatus(msg, isError = false){
      const el = document.getElementById("statusForm");
      el.textContent = msg || "";
      el.style.color = isError ? "#b91c1c" : "#64748b";
    }

    function limparFormulario(limparStatus = true){
        document.getElementById("nome").value = "";
        document.getElementById("usuario").value = "";
        document.getElementById("email").value = "";
        document.getElementById("ativo").value = "true";

        const perfil = document.getElementById("perfil");
        if(perfil.options.length){
            perfil.selectedIndex = 0;
        }

        document.getElementById("usuario").disabled = false;
        document.querySelector(".btn-primary").textContent = "Cadastrar usuário";
        usuarioEditandoId = null;

        if(limparStatus){
            setStatus("");
        }
    }

    async function carregarPerfis(){
      const resp = await fetch(`${API}/auth/perfis`, {
        credentials: "include"
      });

      const data = await resp.json().catch(() => ({}));
      if(!resp.ok) throw new Error(data.detail || "Não foi possível carregar os perfis.");

      const select = document.getElementById("perfil");
      select.innerHTML = "";

      (data.items || []).forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.id;
        opt.textContent = item.nome;
        select.appendChild(opt);
      });
    }

    function montarTabela(items){
      const wrap = document.getElementById("tableWrap");

      if(!items.length){
        wrap.innerHTML = `<div class="empty">Nenhum usuário cadastrado.</div>`;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome / Usuário</th>
              <th>E-mail</th>
              <th>Perfil</th>
              <th>Status</th>
              <th>Troca de senha</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr>
                <td>${item.id}</td>
                <td>
                  <strong>${item.nome}</strong>
                  <div class="muted">${item.usuario}</div>
                </td>
                <td>${item.email || "—"}</td>
                <td>${item.perfil_nome}</td>
                <td>
                  <span class="pill ${item.ativo ? "ok" : "off"}">
                    ${item.ativo ? "Ativo" : "Inativo"}
                  </span>
                </td>
                <td>
                  <span class="pill ${item.deve_trocar_senha ? "warn" : "ok"}">
                    ${item.deve_trocar_senha ? "Pendente" : "OK"}
                  </span>
                </td>
                <td>
                    <button onclick="editarUsuario(${item.id})">Editar</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function carregarUsuarios(){
        const resp = await fetch(`${API}/auth/usuarios`, {
            credentials: "include"
        });

        const data = await resp.json().catch(() => ({}));
        if(!resp.ok) throw new Error(data.detail || "Não foi possível carregar os usuários.");

        window._usuarios = data.items || [];
        montarTabela(data.items || []);
    }

    async function criarUsuario(){
        const nome = document.getElementById("nome").value.trim();
        const usuario = document.getElementById("usuario").value.trim();
        const email = document.getElementById("email").value.trim();
        const perfil_id = Number(document.getElementById("perfil").value);
        const ativo = document.getElementById("ativo").value === "true";

        if(!nome || !usuario || !perfil_id){
            setStatus("Preencha nome, usuário e perfil.", true);
            return;
        }

        let url = `${API}/auth/usuarios`;
        let method = "POST";
        let body = {
            nome,
            usuario,
            email,
            perfil_id,
            ativo
        };

        if(usuarioEditandoId){
            url = `${API}/auth/usuarios/${usuarioEditandoId}`;
            method = "PUT";

            body = {
            nome,
            email,
            perfil_id,
            ativo
            };
        }

        setStatus(usuarioEditandoId ? "Atualizando usuário..." : "Cadastrando usuário...");

        try{
            const resp = await fetch(url, {
            method,
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify(body)
            });

            const data = await resp.json().catch(() => ({}));

            if(!resp.ok){
            throw new Error(data.detail || "Não foi possível salvar o usuário.");
            }

            if(usuarioEditandoId){
            setStatus("Usuário atualizado com sucesso.");
            } else {
              alert(
                `Usuário cadastrado com sucesso!\n\n` +
                `Usuário: ${usuario}\n` +
                `Senha temporária: ${data.senha_temporaria}\n\n` +
                `O usuário deverá trocar a senha no primeiro acesso.`
              );

              setStatus("Usuário cadastrado com sucesso.");
            }

            usuarioEditandoId = null;
            limparFormulario(false);
            document.getElementById("usuario").disabled = false;
            document.querySelector(".btn-primary").textContent = "Cadastrar usuário";

            await carregarUsuarios();
        }catch(err){
            console.error(err);
            setStatus(err.message || "Erro ao salvar usuário.", true);
        }
    }

    (async function init(){
      try{
        await carregarUsuario();
        await carregarPerfis();
        await carregarUsuarios();
      }catch(err){
        console.error(err);
        setStatus(err.message || "Erro ao inicializar a tela.", true);
      }
    })();

    let usuarioEditandoId = null;

    function editarUsuario(id){
        const user = window._usuarios.find(u => u.id === id);
        if(!user) return;

        usuarioEditandoId = id;

        document.getElementById("nome").value = user.nome;
        document.getElementById("usuario").value = user.usuario;
        document.getElementById("email").value = user.email || "";
        document.getElementById("perfil").value = String(user.perfil_id);
        document.getElementById("ativo").value = user.ativo ? "true" : "false";

        document.getElementById("usuario").disabled = true;
        document.querySelector(".btn-primary").textContent = "Salvar alterações";

        setStatus("Editando usuário...");
    }

  </script>
</body>
</html>
