<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Esqueci minha senha • Painel Educação Profissional</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e5e7eb;
      --shadow: 0 10px 24px rgba(15,23,42,.08);
      --radius:14px;
      --radius-sm:12px;

      --brand:#2563eb;
      --brand-dark:#1d4ed8;
      --ok:#16a34a;
      --bad:#ef4444;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(37,99,235,.06), transparent 24%),
        var(--bg);
      color: var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .auth-shell{
      width:min(420px, 100%);
      display:flex;
      justify-content:center;
    }

    .card{
      width:100%;
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:28px;
    }

    .brand-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:fit-content;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      color: var(--muted);
      font-size:12px;
      box-shadow: 0 6px 14px rgba(15,23,42,.06);
      margin-bottom:18px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background: var(--brand);
      box-shadow: 0 0 0 5px rgba(37,99,235,.12);
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
      letter-spacing:.2px;
    }

    .sub{
      margin:0 0 18px;
      color: var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .alert{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:12px;
      font-size:13px;
      line-height:1.45;
      border:1px solid transparent;
    }

    .alert.show{ display:block; }
    .alert.error{
      background:#fff5f5;
      border-color:#fecaca;
      color:#b91c1c;
    }
    .alert.ok{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#166534;
    }

    .field{
      margin-bottom:14px;
    }

    label{
      display:block;
      font-size:12px;
      color: var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    input{
      width:100%;
      border:1px solid var(--border);
      border-radius: var(--radius-sm);
      padding:12px 14px;
      background:#fff;
      outline:none;
      height:46px;
      font-size:14px;
      color: var(--text);
    }

    input:focus{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .btn-primary,
    .btn-secondary{
      width:100%;
      appearance:none;
      padding:12px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:750;
      font-size:14px;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
    }

    .btn-primary{
      border:1px solid rgba(37,99,235,.65);
      background: var(--brand);
      color:#fff;
      margin-bottom:10px;
    }

    .btn-primary:hover{
      background: var(--brand-dark);
    }

    .btn-secondary{
      border:1px solid var(--border);
      background:#fff;
      color: var(--text);
    }

    .btn-secondary:hover{
      background:#f8fafc;
      border-color:#dbe3ef;
    }

    .btn-primary[disabled]{
      opacity:.7;
      cursor:wait;
    }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="card">
      <div class="brand-badge">
        <span class="dot"></span>
        Painel Educação Profissional
      </div>

      <h1>Esqueci minha senha</h1>
      <p class="sub">
        Informe seu usuário ou e-mail para solicitar a redefinição da senha.
      </p>

      <div id="alerta" class="alert error"></div>

      <form id="formEsqueciSenha">
        <div class="field">
          <label for="identificador">Usuário ou e-mail</label>
          <input
            id="identificador"
            name="identificador"
            type="text"
            placeholder="Seu usuário ou e-mail"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="btnEnviar">
          Solicitar redefinição
        </button>

        <button type="button" class="btn-secondary" onclick="window.location.href='/login.html'">
          Voltar para o login
        </button>
      </form>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    const alerta = document.getElementById("alerta");
    const form = document.getElementById("formEsqueciSenha");
    const btnEnviar = document.getElementById("btnEnviar");

    function mostrarAlerta(msg, tipo = "error"){
      alerta.className = `alert show ${tipo}`;
      alerta.textContent = msg;
    }

    function esconderAlerta(){
      alerta.className = "alert";
      alerta.textContent = "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      esconderAlerta();

      const identificador = document.getElementById("identificador").value.trim();

      if(!identificador){
        mostrarAlerta("Informe seu usuário ou e-mail.");
        return;
      }

      btnEnviar.disabled = true;
      btnEnviar.textContent = "Enviando...";

      try{
        const resp = await fetch(`${API}/auth/esqueci-senha`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ identificador })
        });

        const data = await resp.json().catch(() => ({}));

        if(!resp.ok){
          throw new Error(data.detail || "Não foi possível processar a solicitação.");
        }

        mostrarAlerta(
            "Solicitação registrada. Aguarde contato do administrador.",
            "ok"
        );
        form.reset();

        form.reset();
      }catch(err){
        console.error(err);
        mostrarAlerta(err.message || "Erro ao solicitar redefinição.");
      }finally{
        btnEnviar.disabled = false;
        btnEnviar.textContent = "Solicitar redefinição";
      }
    });
  </script>
</body>
</html>
